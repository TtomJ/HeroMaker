<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1 style="text-align: center;">Vyrob si hrdinu fr</h1>
    <form id="heroForm" onsubmit="return false;">
        <label class="formularLabel" for="jmeno">Jméno hrdiny </label>
        <input id="jmeno" name="jmeno" type="text">
        <label class="formularLabel" for="level">Level</label>
        <input id="level" name="level" type="text">
        <label class="formularLabel" for="tridy">Třída</label>
        <select id="tridy" name="tridy" style="margin-bottom: 10px;">
            <option value="Bojovník">Bojovník</option>
            <option value="Lučištník">Lučištník</option>
            <option value="Šaman">Šaman</option>
        </select>
        <!-- Toto tlačítko vytvoří objekt s danými vlastnostmi-->
        <button type="button" class="btn btn-primary" style="margin-bottom: 10px;" onclick="vytvorHrdinu()">Vytvořit hrdinu</button>
        <!-- Toto tlačítko vypíše údaje z objektu do nového elementu p -->
        <button type="button" class="btn btn-secondary" onclick="vypisUdaje()">Vypsat Udaje</button>
    </form>
    <div id="heroDetailsContainer" class="overflow-auto" style="max-height: 700px;width: 700px;border: 4px solid #ccc; padding: 10px; margin-top: 20px; margin-left:10px;">
    </div>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
